name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.0

      - name: Format, lint, typecheck, doc lint
        run: deno task check

      - name: Tests
        run: deno task test
